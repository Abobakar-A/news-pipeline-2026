name: News Pipeline CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Linting Tools
        run: |
          pip install flake8
          
      - name: Lint Python Code
        run: |
          # فحص كود محرك التوصية والـ DAGs
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build-containers:
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Recommender Service
        run: |
          docker build -t news-recommender:latest ./recommendation_service

      - name: Build Airflow Custom Image
        run: |
          docker build -t custom-airflow:latest .

      # خطوة اختيارية: التأكد من أن docker-compose سليم
      - name: Check Docker Compose Config
        run: docker-compose config